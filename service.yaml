apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: errands-on-demand
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    spec:
      containers:
        # Nginx Ingress Container (Sidecar)
        - name: nginx-container
          image: us-central1-docker.pkg.dev/serverless-runtimes/google-22/runtimes/nginx # Using a standard runtime image if possible, or placeholder
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 500m
              memory: 256Mi

        # App Container
        - name: app-container
          image: us-central1-docker.pkg.dev/serverless-runtimes/google-22/runtimes/nodejs22
          env:
            - name: PORT
              value: "8080"
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
